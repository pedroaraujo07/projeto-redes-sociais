<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/style.css">
    <title>Projeto Redes Sociais</title>
</head>
<body>
    <main>
        <div id="div-iphone">
            <img id="iphone" src="imagens/frame-iphone.png" alt="iPhone Frame com tela preta">
            <img id="tela-home" src="imagens/tela-home.jpg" alt="Tela Home do iPhone">
            <iframe name="iframe" src="" frameborder="0"></iframe>
        </div>

        <div id="div-botoes">
            
            <a href="imagens/tela-home.jpg" target="iframe">
                <img class="botao" src="imagens/logo-home.jpg" alt="Botão Home">
            </a>

            <a href="imagens/tela-github.jpg" target="iframe">
                <img class="botao" src="imagens/logo-youtube.jpg" alt="Botão Youtube">
            </a>

        </div>
    </main>
</body>
</html>
